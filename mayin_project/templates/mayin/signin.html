{% extends 'mayin/base.html' %}
{% block title %}Sign In — mayin Jewellery{% endblock %}

{% block extra_head %}
<style>
  nav { display: none; }
  *, *::before, *::after { box-sizing: border-box; }
  body { background: linear-gradient(135deg, #fdf8f0 0%, #f5ebe0 100%); font-family: 'Jost', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

  .auth-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .auth-card { background: white; border: 1px solid #e8d8c8; border-radius: 16px; width: 100%; max-width: 420px; padding: 2.5rem 2.5rem 2rem; }

  .auth-logo { text-align: center; margin-bottom: 2rem; }
  .auth-logo-text { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 600; color: #9e7a2a; letter-spacing: 0.1em; display: block; }
  .auth-logo-sub { font-size: 0.68rem; color: #b8a090; letter-spacing: 0.18em; text-transform: uppercase; }

  .auth-title { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 400; color: #3a2e28; margin-bottom: 0.3rem; text-align: center; }
  .auth-sub { font-size: 0.82rem; color: #a09080; text-align: center; margin-bottom: 1.8rem; }

  .form-group { margin-bottom: 1rem; }
  label { display: block; font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; color: #a09080; margin-bottom: 0.4rem; }
  input[type=email], input[type=password], input[type=text] { width: 100%; padding: 0.75rem 1rem; border: 1.5px solid #e8d8c8; border-radius: 6px; font-family: 'Jost', sans-serif; font-size: 0.9rem; color: #4a3c34; background: #fffaf4; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
  input:focus { border-color: #c9a84c; box-shadow: 0 0 0 3px rgba(201,168,76,0.1); background: white; }

  .forgot-link { display: block; text-align: right; font-size: 0.75rem; color: #c9a84c; text-decoration: none; margin-top: 0.3rem; }
  .forgot-link:hover { text-decoration: underline; }

  .auth-btn { width: 100%; padding: 1rem; background: #c9a84c; color: white; border: none; border-radius: 6px; font-family: 'Jost', sans-serif; font-size: 0.85rem; letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer; transition: background 0.2s, transform 0.15s; margin-top: 0.5rem; }
  .auth-btn:hover { background: #9e7a2a; transform: translateY(-1px); }
  .auth-btn:disabled { background: #c8b8a8; cursor: not-allowed; transform: none; }

  .divider { display: flex; align-items: center; gap: 1rem; margin: 1.3rem 0; }
  .divider-line { flex: 1; height: 1px; background: #e8d8c8; }
  .divider-text { font-size: 0.72rem; color: #b8a090; }

  .google-btn { width: 100%; padding: 0.85rem; background: white; border: 1.5px solid #e8d8c8; border-radius: 6px; font-family: 'Jost', sans-serif; font-size: 0.85rem; color: #4a3c34; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: border-color 0.2s, background 0.2s; }
  .google-btn:hover { border-color: #c9a84c; background: #fffaf4; }
  .g-icon { width: 18px; height: 18px; }

  .auth-footer { text-align: center; font-size: 0.82rem; color: #a09080; margin-top: 1.5rem; }
  .auth-footer a { color: #9e7a2a; text-decoration: none; font-weight: 500; }
  .auth-footer a:hover { text-decoration: underline; }

  .error-msg { background: #fcebeb; border: 1px solid #f0b0b0; color: #a32d2d; font-size: 0.82rem; padding: 0.7rem 1rem; border-radius: 6px; margin-bottom: 1rem; display: none; }
  .error-msg.show { display: block; }
  .success-msg { background: #eaf3de; border: 1px solid #b0d890; color: #3b6d11; font-size: 0.82rem; padding: 0.7rem 1rem; border-radius: 6px; margin-bottom: 1rem; display: none; }
  .success-msg.show { display: block; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="{% url 'home' %}" style="text-decoration:none">
        <span class="auth-logo-text">mayin</span>
        <span class="auth-logo-sub">Jewellery</span>
      </a>
    </div>

    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-sub">Sign in to your mayin account</p>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
      <a href="#" class="forgot-link">Forgot password?</a>
    </div>

    <button class="auth-btn" id="signinBtn" onclick="doSignin()">Sign In</button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or</span>
      <div class="divider-line"></div>
    </div>

    <button class="google-btn">
      <svg class="g-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>

    <div class="auth-footer">
      Don't have an account? <a href="{% url 'signup' %}">Create one</a>
    </div>
  </div>
</div>

<script>
  async function doSignin() {
    const btn = document.getElementById('signinBtn');
    const errEl = document.getElementById('errorMsg');
    const sucEl = document.getElementById('successMsg');
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    errEl.classList.remove('show'); sucEl.classList.remove('show');
    if (!email || !password) { errEl.textContent = 'Please fill in all fields.'; errEl.classList.add('show'); return; }
    btn.disabled = true; btn.textContent = 'Signing in…';
    try {
      const res = await fetch('http://localhost:8001/api/auth/signin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (res.ok && data.access_token) {
        localStorage.setItem('mayinToken', data.access_token);
        localStorage.setItem('mayinUser', JSON.stringify(data.user));
        sucEl.textContent = '✓ Signed in! Redirecting…'; sucEl.classList.add('show');
        setTimeout(() => window.location.href = '/', 1000);
      } else {
        errEl.textContent = data.detail || 'Invalid email or password.'; errEl.classList.add('show');
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    } catch(e) {
      errEl.textContent = 'Could not connect to server. Please try again.'; errEl.classList.add('show');
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  }
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doSignin(); });
</script>
{% endblock %}
